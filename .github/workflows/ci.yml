name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: fmt + clippy + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: tests
        run: cargo test --workspace

  crash-harness:
    name: crash harness (1000 kills)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: kill -9 the pager a thousand times
        run: cargo test -p quanty-core --test crash_harness -- --nocapture
        env:
          QUANTY_CRASH_ITERS: "1000"

  msrv:
    name: build on MSRV (1.75)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.75
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  heavy:
    name: heavy tests (release)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: 1M key bulk load and scan
        run: cargo test -p quanty-core --release --test heavy -- --ignored --nocapture

  parser-fuzz:
    name: parser fuzz (10 min)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: fuzz the QQL parser
        run: cargo test -p quanty-ql --release --test parser_fuzz -- --nocapture
        env:
          QUANTY_FUZZ_SECS: "600"
